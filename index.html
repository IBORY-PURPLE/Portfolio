    <script>
      (function () {
        try {
          var storedTheme = window.localStorage.getItem("portfolio-theme");
          var theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : "light";
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
